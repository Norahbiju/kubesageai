upstream kubesage_web {
    server web:3000;
}

upstream kubesage_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
        proxy_pass http://kubesage_api/health;
    }

    location = /health/azure {
        proxy_pass http://kubesage_api/health/azure;
    }

    location = /health/openai {
        proxy_pass http://kubesage_api/health/openai;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Connection "";
        proxy_pass http://kubesage_api;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://kubesage_web;
    }
}
