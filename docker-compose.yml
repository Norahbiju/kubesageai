services:
  postgres:
    image: postgres:16-alpine
    container_name: kubesage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kubesage-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway: &backend
    build:
      context: ./services/platform
      dockerfile: Dockerfile
    container_name: kubesage-api-gateway
    restart: unless-stopped
    environment: &backend_env
      SERVICE_NAME: api-gateway
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_REDIRECT_URI: ${AZURE_REDIRECT_URI}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    <<: *backend
    container_name: kubesage-auth-service
    ports: []
    environment:
      <<: *backend_env
      SERVICE_NAME: auth-service

  azure-service:
    <<: *backend
    container_name: kubesage-azure-service
    ports: []
    environment:
      <<: *backend_env
      SERVICE_NAME: azure-service

  cluster-service:
    <<: *backend
    container_name: kubesage-cluster-service
    ports: []
    environment:
      <<: *backend_env
      SERVICE_NAME: cluster-service

  incident-service:
    <<: *backend
    container_name: kubesage-incident-service
    ports: []
    environment:
      <<: *backend_env
      SERVICE_NAME: incident-service

  ai-analysis-service:
    <<: *backend
    container_name: kubesage-ai-analysis-service
    ports: []
    environment:
      <<: *backend_env
      SERVICE_NAME: ai-analysis-service

  remediation-service:
    <<: *backend
    container_name: kubesage-remediation-service
    ports: []
    environment:
      <<: *backend_env
      SERVICE_NAME: remediation-service

  notification-stream-service:
    <<: *backend
    container_name: kubesage-notification-stream-service
    ports: []
    environment:
      <<: *backend_env
      SERVICE_NAME: notification-stream-service

  audit-service:
    <<: *backend
    container_name: kubesage-audit-service
    ports: []
    environment:
      <<: *backend_env
      SERVICE_NAME: audit-service

  frontend-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: kubesage-frontend-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres-data:
