services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: kubesage-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite+aiosqlite:////data/kubesage.db
      BACKEND_URL: ${BACKEND_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost"]}'
      JWT_SECRET: ${JWT_SECRET:-change-me-for-local-compose}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      DEMO_MODE: ${DEMO_MODE:-false}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-common}
      AZURE_REDIRECT_URI: ${AZURE_REDIRECT_URI:-http://localhost/api/auth/azure/callback}
      AZURE_SUBSCRIPTION_IDS: '${AZURE_SUBSCRIPTION_IDS:-[]}'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    expose:
      - "8000"
    volumes:
      - kubesage-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-same-origin}
    container_name: kubesage-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-same-origin}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: kubesage-nginx
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  kubesage-data:
