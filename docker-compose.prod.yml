services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: kubesage-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: sqlite+aiosqlite:////data/kubesage.db
      BACKEND_URL: ${BACKEND_URL:?set BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL:?set FRONTEND_URL}
      CORS_ORIGINS: '${CORS_ORIGINS:?set CORS_ORIGINS}'
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      DEMO_MODE: ${DEMO_MODE:-false}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:?set AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:?set AZURE_CLIENT_SECRET}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:?set AZURE_TENANT_ID}
      AZURE_REDIRECT_URI: ${AZURE_REDIRECT_URI:?set AZURE_REDIRECT_URI}
      AZURE_SUBSCRIPTION_IDS: '${AZURE_SUBSCRIPTION_IDS:-[]}'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    expose:
      - "8000"
    volumes:
      - kubesage-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-same-origin}
    container_name: kubesage-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-same-origin}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: kubesage-nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

  caddy:
    image: caddy:2.8-alpine
    container_name: kubesage-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nginx

volumes:
  kubesage-data:
  caddy-data:
  caddy-config:
